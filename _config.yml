# Jekyll 站点配置
title: AI Fundamentals
email: wang.tianqing.cn@gmail.com
description: >-
  AI 基础知识 - GPU 架构、CUDA 编程、大模型基础及AI Agent 相关知识。

# GitHub Pages 官方支持的主题
theme: minima

# 站点基础配置
baseurl: "/AI-fundermentals"
url: "https://wangtianqing.github.io"

# 作者信息
author:
  name: Grissom Wang

# 社交媒体链接（Minima 主题支持）
minima:
  social_links:
    - { platform: github,  user_url: "https://github.com/grissomsh" }

# 构建设置
markdown: kramdown
highlighter: rouge

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 包含的文件和目录
include:
  - README.md
  - AGENTS.md

# 排除的文件和目录
exclude:
  - .git/
  - .gitignore
  - .qoder/
  - .trae/
  - .DS_Store
  - img/alipay.JPG
  - img/weixinpay.JPG
  - "*/.DS_Store"
